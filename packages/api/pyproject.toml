[project]
name = "api"
version = "0.1.0"
description = "Agent persona registry + chat exposure (FastAPI + Postgres)"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "python-dotenv>=1.0",
    "agent",
    "alembic>=1.18.4",
    "psycopg[binary,pool]>=3.3.4",  # pool: mem0 pgvector 벡터 스토어(ConnectionPool) 요구
    "langgraph-checkpoint-postgres>=2.0",  # durable HIL 체크포인터(AsyncPostgresSaver, 스펙 041)
    "httpx>=0.28.1",
    "cryptography>=49.0.0",
    "pgvector>=0.3",  # SQLAlchemy Vector 타입 — RAG 청크 저장(스펙 036)
    "pypdf>=5",  # PDF 텍스트 추출(RAG 인제스트)
    "langchain-text-splitters>=0.3",  # RecursiveCharacterTextSplitter(청킹)
    "langchain-mcp-adapters>=0.1",  # MultiServerMCPClient — MCP 서버 실연결→LangChain 툴(스펙 054)
    "mcp>=1.0",  # MCP SDK(FastMCP) — self-host 실 mock MCP 서버(/_remote/mcp, 스펙 054)
    "fastapi-users[sqlalchemy]>=15.0.2",
    "casbin>=1.40",
    "casbin-async-sqlalchemy-adapter>=1.4",
    "apscheduler>=3.10",  # 격리 배치 서비스 내부 스케줄러(스펙 038)
]

[project.scripts]
api = "api.main:run"
batch = "api.batch.__main__:main"  # 격리 배치 서비스 진입점(스펙 038)
bootstrap-admin = "api.bootstrap_admin:main"  # 첫 관리자/락아웃 복구(스펙 058 G2)

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]
