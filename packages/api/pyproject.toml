[project]
name = "api"
version = "0.1.0"
description = "Agent persona registry + chat exposure (FastAPI + Postgres)"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "python-dotenv>=1.0",
    "agent",
    "alembic>=1.18.4",
    "psycopg[binary,pool]>=3.3.4",  # pool: mem0 pgvector 벡터 스토어(ConnectionPool) 요구
    "httpx>=0.28.1",
    "cryptography>=49.0.0",
    "fastapi-users[sqlalchemy]>=15.0.2",
    "casbin>=1.40",
    "casbin-async-sqlalchemy-adapter>=1.4",
]

[project.scripts]
api = "api.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]
