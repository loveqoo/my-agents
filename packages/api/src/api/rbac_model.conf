# Casbin RBAC 모델 (스펙 031) — 정책을 코드에서 분리한다.
# request:  (subject=유저id, object=리소스, action=행위)
# policy:   p, <role|user>, <obj|*>, <act|*>
# grouping: g, <유저id>, <role>   (role 할당의 진실 원천 = casbin_rule)
# matcher는 와일드카드(*)를 허용해 1차엔 coarse(p, admin, *, *), 나중에 fine-grained로
# 확장해도 호출부(enforce(sub,obj,act))는 불변. RBAC→ABAC 확장 시 이 파일만 바꾼다.
[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && (p.obj == "*" || r.obj == p.obj) && (p.act == "*" || r.act == p.act)
