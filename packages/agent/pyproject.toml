[project]
name = "agent"
version = "0.1.0"
description = "Minimal hardcoded agent — local MLX + LangGraph ReAct (CLI)"
requires-python = ">=3.12"
dependencies = [
    "langgraph>=1.2.5",
    "langchain>=1.0",  # create_agent(=구 create_react_agent 후속, 스펙 076)
    "langchain-openai>=1.3.2",
    "langchain-core>=1.4.7",
    "python-dotenv>=1.0",
    "mem0ai>=2.0.7",
]

[project.scripts]
agent = "agent.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent"]
